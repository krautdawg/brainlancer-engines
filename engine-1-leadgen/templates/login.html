<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI Katapult – Lead Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
    .font-lexend { font-family: 'Lexend', sans-serif; }
    .btn-primary {
      background: #0ea5e9;
      color: white;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      background: #0284c7;
      box-shadow: 0 4px 14px rgba(14,165,233,0.3);
      transform: translateY(-1px);
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .input-field {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
    }
    .input-field::placeholder { color: #94a3b8; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Subtle decorative shapes -->
  <div class="absolute top-0 left-0 w-96 h-96 rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(14,165,233,0.07) 0%,transparent 70%);"></div>
  <div class="absolute bottom-0 right-0 w-80 h-80 rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(16,185,129,0.07) 0%,transparent 70%);"></div>

  <div class="w-full max-w-md px-6 fade-up">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#0ea5e9,#0060aa)">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="font-lexend text-2xl text-slate-800 tracking-tight">KI Katapult</span>
      </div>
      <p class="text-sm text-slate-500">Engine 1 &mdash; Lead Generator</p>
    </div>

    <!-- Card -->
    <div class="card rounded-2xl p-8">
      <h1 class="font-lexend text-2xl text-slate-800 mb-1">Willkommen zurück</h1>
      <p class="text-sm text-slate-500 mb-6">Bitte melden Sie sich an, um fortzufahren.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium"
           style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold mb-2 text-slate-500 uppercase tracking-wide">Passwort</label>
          <input
            type="password"
            name="password"
            placeholder="••••••••••••"
            autofocus
            required
            class="input-field w-full px-4 py-3 rounded-xl text-sm"
          />
        </div>
        <button type="submit" class="btn-primary w-full py-3 px-6 rounded-xl text-sm">
          Anmelden
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-slate-100">
        <p class="text-xs text-center text-slate-400">
          KI Katapult &copy; 2026 &mdash; Powered by Gemini Flash
        </p>
      </div>
    </div>
  </div>

</body>
</html>
