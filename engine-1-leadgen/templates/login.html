<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI Katapult – Lead Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #0b1e2d; }
    .font-lexend { font-family: 'Lexend', sans-serif; }
    .bg-navy { background-color: #132A3E; }
    .text-mint { color: #00FFC5; }
    .text-sky { color: #00B3FF; }
    .border-sky { border-color: #00B3FF; }
    .btn-primary {
      background: linear-gradient(135deg, #00B3FF, #0080cc);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #00c8ff, #00B3FF);
      box-shadow: 0 0 24px rgba(0,179,255,0.4);
      transform: translateY(-1px);
    }
    .glass-card {
      background: rgba(19,42,62,0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,179,255,0.2);
    }
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,179,255,0.25);
      color: white;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #00B3FF;
      box-shadow: 0 0 0 3px rgba(0,179,255,0.15);
    }
    .grid-bg {
      background-image: linear-gradient(rgba(0,179,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,179,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
  </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background orbs -->
  <div class="glow-orb w-96 h-96 top-0 left-0" style="background:#00B3FF;"></div>
  <div class="glow-orb w-80 h-80 bottom-0 right-0" style="background:#00FFC5;"></div>

  <div class="w-full max-w-md px-6 fade-up">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#00B3FF,#0060aa)">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="font-lexend text-2xl text-white tracking-tight">KI Katapult</span>
      </div>
      <p class="text-sm" style="color:rgba(255,255,255,0.45)">Engine 1 &mdash; Lead Generator</p>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-2xl p-8">
      <h1 class="font-lexend text-2xl text-white mb-1">Willkommen zurück</h1>
      <p class="text-sm mb-6" style="color:rgba(255,255,255,0.5)">Bitte melden Sie sich an, um fortzufahren.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium"
           style="background:rgba(255,80,80,0.12); border:1px solid rgba(255,80,80,0.3); color:#ff9090;">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-xs font-medium mb-2" style="color:rgba(255,255,255,0.6)">PASSWORT</label>
          <input
            type="password"
            name="password"
            placeholder="••••••••••••"
            autofocus
            required
            class="input-field w-full px-4 py-3 rounded-xl text-sm placeholder-gray-500"
          />
        </div>
        <button type="submit" class="btn-primary w-full py-3 px-6 rounded-xl text-white font-semibold text-sm">
          Anmelden
        </button>
      </form>

      <div class="mt-6 pt-5" style="border-top:1px solid rgba(255,255,255,0.06)">
        <p class="text-xs text-center" style="color:rgba(255,255,255,0.25)">
          KI Katapult &copy; 2026 &mdash; Powered by Gemini Flash
        </p>
      </div>
    </div>
  </div>

</body>
</html>
