worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream definitions
    upstream landing    { server landing:80; }
    upstream leadgen    { server engine-1-leadgen:3001; }
    upstream outbound   { server engine-2-outbound:3002; }
    upstream vat        { server engine-3-vat:3003; }
    upstream onboarding { server engine-4-onboarding:3004; }
    upstream supplier   { server engine-5-supplier:3005; }

    # Landing page - brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Engine 1 - leadgen.brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name leadgen.brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://leadgen;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Engine 2 - outbound.brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name outbound.brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://outbound;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Engine 3 - vat.brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name vat.brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://vat;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Engine 4 - onboarding.brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name onboarding.brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://onboarding;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Engine 5 - supplier.brainlancer.ki-katapult.de
    server {
        listen 80;
        server_name supplier.brainlancer.ki-katapult.de;

        auth_basic "Brainlancer Portfolio";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://supplier;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
