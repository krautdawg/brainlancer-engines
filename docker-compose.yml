version: '3.8'

services:
  landing:
    build:
      context: ./landing
    restart: unless-stopped

  engine-1-leadgen:
    build:
      context: ./engine-1-leadgen
    environment:
      - APP_PASSWORD=br4inlancer
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - e1-data:/data
    restart: unless-stopped

  engine-2-outbound:
    build:
      context: ./engine-2-outbound
    environment:
      - APP_PASSWORD=br4inlancer
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - e2-data:/data
    restart: unless-stopped

  engine-3-vat:
    build:
      context: ./engine-3-vat
    environment:
      - APP_PASSWORD=br4inlancer
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped

  engine-4-onboarding:
    build:
      context: ./engine-4-onboarding
    environment:
      - APP_PASSWORD=br4inlancer
    restart: unless-stopped

  engine-5-supplier:
    build:
      context: ./engine-5-supplier
    environment:
      - APP_PASSWORD=br4inlancer
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - landing
      - engine-1-leadgen
      - engine-2-outbound
      - engine-3-vat
      - engine-4-onboarding
      - engine-5-supplier
    restart: unless-stopped

volumes:
  e1-data:
  e2-data:
